services:
  flowise:
    image: flowiseai/flowise:3.0.13
    environment:
      PORT: "3000"
      APIKEY_PATH: /root/.flowise
      LOG_LEVEL: info
    volumes:
      - flowise-data:/root/.flowise
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/ping"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  mitmproxy:
    image: mitmproxy/mitmproxy:12
    command: mitmdump --mode reverse:http://flowise:3000 -p 8080 -s /addon/capture.py --set stream_large_bodies=10m
    volumes:
      - ./mitmproxy-addon.py:/addon/capture.py:ro
      - ../apps/compat-tests/captures:/captures
    depends_on:
      flowise:
        condition: service_healthy

  flowise-ui-copy:
    image: flowiseai/flowise:3.0.13
    entrypoint: ["sh", "-c", "cp -r /usr/local/lib/node_modules/flowise/node_modules/flowise-ui/build/* /out/"]
    volumes:
      - flowise-ui:/out

  caddy:
    image: caddy:alpine
    ports:
      - "3000:80"
    volumes:
      - flowise-ui:/srv:ro
      - ./Caddyfile.record:/etc/caddy/Caddyfile:ro
    depends_on:
      mitmproxy:
        condition: service_started
      flowise-ui-copy:
        condition: service_completed_successfully
      flowise:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  flowise-data:
  flowise-ui:
