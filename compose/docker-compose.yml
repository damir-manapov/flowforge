services:
  starter:
    image: alpine:3.21
    command: ["echo", "All services are ready"]
    depends_on:
      flowforge-server:
        condition: service_healthy

  flowforge-server:
    build:
      context: ..
      dockerfile: compose/Dockerfile
    ports:
      - "4000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      LOG_LEVEL: "info"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/ping').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
