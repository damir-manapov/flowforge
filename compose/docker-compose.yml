services:
  flowforge-server:
    build:
      context: ..
      dockerfile: compose/Dockerfile
    ports:
      - "4000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      LOG_LEVEL: "info"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/ping').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  flowise-ui-copy:
    profiles: [ui]
    image: flowiseai/flowise:1.8.4
    entrypoint: ["sh", "-c", "cp -r /usr/local/lib/node_modules/flowise/node_modules/flowise-ui/build/* /out/"]
    volumes:
      - flowise-ui:/out

  caddy:
    profiles: [ui]
    image: caddy:alpine
    ports:
      - "3000:80"
    volumes:
      - flowise-ui:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      flowise-ui-copy:
        condition: service_completed_successfully
      flowforge-server:
        condition: service_healthy

volumes:
  flowise-ui:
